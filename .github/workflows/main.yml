name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy elliotkirk
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.SSH_HOST}}
          key: ${{secrets.SSH_KEY}}
          username: ${{secrets.SSH_USERNAME}}
          passphrase: ${{secrets.SSH_PASSPHRASE}}

          script: |
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh
            cd elliotkirk
            nvm install 24
            nvm use 24
            corepack enable
            set -e
            GIT_SSH_COMMAND="ssh -i /home/steve/.ssh/elliotkirk_deploy -o IdentitiesOnly=yes" git fetch origin main
            git reset --hard FETCH_HEAD
            yarn
            yarn build
            echo "Deployed elliotkirk"
